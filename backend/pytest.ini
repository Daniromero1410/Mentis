[pytest]
testpaths = tests
pythonpath = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    auth: Pruebas de autenticacion y tokens
    crud: Pruebas de creacion, lectura, actualizacion y eliminacion
    seguridad: Pruebas de autorizacion y proteccion de datos
    integridad: Pruebas de consistencia e integridad de datos
    pdf: Pruebas de generacion de documentos PDF
    usuarios: Pruebas de administracion de usuarios
    blocker: Fallo critico que bloquea el sistema
    smoke: Pruebas rapidas de humo (subset minimo)

addopts =
    -v
    --tb=short
    --html=../reports/pytest/report.html
    --self-contained-html
    --alluredir=../reports/allure-results

log_cli = true
log_cli_level = INFO
